{% extends "base.html" %}

{% block header_message %}
{{ _('How much has the Sketch Map Tool been used?') }}
{% endblock header_message %}

{% block body %}
<main class="container">
	<article>
		<header>{{ _('Number of created Sketch Maps') }}</header>
		<code style="font-size: 2rem;">{{ number_of_sketch_maps }}</code>
	</article>
	{%- for chart in charts %}
	<div id="chart">
		<embed type="image/svg+xml" src={{ chart|safe }}>
	</div>
	{% endfor %}
</main>
{% endblock body %}
